<!DOCTYPE html>
<html>
<head>
  <title>AR Friend Tracker</title>
  <style>
    body { margin: 0; overflow: hidden; }
    video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>

<video id="camera" autoplay playsinline></video>
<canvas id="overlay"></canvas>

<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream)
  .catch(err => alert("Camera permission denied"));

// YOUR LOCATION
let myLat = 0, myLng = 0;

navigator.geolocation.watchPosition(pos => {
  myLat = pos.coords.latitude;
  myLng = pos.coords.longitude;
});

// FAKE FRIEND LOCATION (replace with server data)
let friend = {
  name: "Friend",
  lat: 47.6205,
  lng: -122.3493
};

// SIMPLE DIRECTION CALC
function getDirection() {
  let dx = friend.lng - myLng;
  let dy = friend.lat - myLat;

  return {
    x: canvas.width / 2 + dx * 100000,
    y: canvas.height / 2 - dy * 100000
  };
}

// DRAW LOOP
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let pos = getDirection();

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillText(friend.name, pos.x + 12, pos.y);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
