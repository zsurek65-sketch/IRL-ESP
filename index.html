<!DOCTYPE html>
<html>
<head>
  <title>Tripwire Multiplayer</title>
</head>
<body>

<h2>Tripwire System</h2>

<label>Name: <input id="name"></label><br>
<label>Radius (m): <input id="radius" value="10"></label><br>
<button onclick="createTripwire()">Create Tripwire</button>

<h3 id="status">Connecting...</h3>

<script>
const ws = new WebSocket("ws://localhost:3000");

let myId = null;
let tripwires = [];

ws.onopen = () => {
  document.getElementById("status").innerText = "Connected";
};

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);

  if (data.type === "init") {
    myId = data.id;
    tripwires = data.tripwires;
  }

  if (data.type === "tripwire_list") {
    tripwires = data.tripwires;
  }

  if (data.type === "trigger") {
    alert(`🚨 ${data.user} triggered ${data.name}`);
  }
};

// SEND LOCATION
navigator.geolocation.watchPosition(pos => {
  ws.send(JSON.stringify({
    type: "location",
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  }));
});

// CREATE TRIPWIRE
function createTripwire() {
  navigator.geolocation.getCurrentPosition(pos => {
    ws.send(JSON.stringify({
      type: "tripwire",
      name: document.getElementById("name").value || "Tripwire",
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      radius: parseFloat(document.getElementById("radius").value)
    }));
  });
}
</script>

</body>
</html>
