<!DOCTYPE html>
<html>
<head>
  <title>AR Location Demo</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: lime;
      font-family: monospace;
      pointer-events: none;
    }
    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      text-align: center;
    }
  </style>
</head>
<body>

<video id="camera" autoplay playsinline></video>
<div id="overlay"></div>

<script>
const video = document.getElementById("camera");
const overlay = document.getElementById("overlay");

// Ask for camera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => alert("Camera permission denied"));

// Ask for location
navigator.geolocation.getCurrentPosition(pos => {
  const myLat = pos.coords.latitude;
  const myLon = pos.coords.longitude;

  // Simulated "friend" location (change this manually)
  const target = {
    lat: myLat + 0.001,
    lon: myLon + 0.001
  };

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function updateOverlay() {
    overlay.innerHTML = "";

    const dist = getDistance(myLat, myLon, target.lat, target.lon);

    const marker = document.createElement("div");
    marker.className = "marker";

    marker.style.left = "50%";
    marker.style.top = "50%";

    marker.innerHTML = `
      <div>☠</div>
      <div>${Math.round(dist)} meters</div>
    `;

    overlay.appendChild(marker);
  }

  updateOverlay();

}, err => alert("Location permission denied"));
</script>

</body>
</html>
